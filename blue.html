<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix of Events - BlackSlon Protocol</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { 
            background-color: #000; 
            margin: 0; 
            padding: 80px 20px 20px 20px; /* Większy górny padding na logo */
            font-family: 'Courier New', monospace; 
            color: #fff; 
        }
        :root { --bs-blue: #4682B4; --bs-red: #cc0000; --bs-green: #00ff88; --bs-yellow: #ffcc00; }
        
        /* LOGO / HOME LINK */
        .protocol-header {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            z-index: 1000;
        }
        .logo-box {
            width: 25px;
            height: 25px;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-inner {
            width: 12px;
            height: 12px;
            background: #fff;
        }
        .protocol-name {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* LAYOUT */
        .matrix-layout { display: flex; gap: 15px; max-width: 1300px; margin: auto; }
        .matrix-main { flex: 1; border: 1px solid #1a1a1a; padding: 15px; background: #020202; position: relative; }
        .side-panel { width: 260px; border: 1px solid #1a1a1a; padding: 15px; background: #050505; font-size: 11px; height: fit-content; }
        
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-top: 40px; }
        .event-card { background: #000; border: 1px solid #151515; padding: 12px; border-top: 2px solid var(--bs-blue); min-height: 220px; transition: 0.3s; }
        .event-card:hover { border-color: var(--bs-blue); }

        .yield-badge { font-size: 14px; font-weight: bold; color: var(--bs-green); }
        .v-btn { flex: 1; padding: 8px; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid #222; background: transparent; color: #fff; }
        .v-btn:hover { background: #111; }

        .matrix-input, .matrix-select, .matrix-textarea { background: #000; border: 1px solid #1a1a1a; color: #ccc; padding: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; font-family: monospace; }
        .v-btn-submit { width: 100%; padding: 10px; border: 1px solid var(--bs-yellow); background: transparent; color: var(--bs-yellow); cursor: pointer; font-weight: bold; }
        
        @media (max-width: 768px) {
            .matrix-layout { flex-direction: column; }
            .side-panel { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="blackslon-matrix-root"></div>

    <script type="text/babel">
        const EVENTS = [
            { market: 'NAT GAS', region: 'UKRAINE', desc: 'Will Russia destroy the world’s largest underground gas storage facility in Ukraine?', stake: '1,240,000', yield: '740%', deadline: '30.06.2026' },
            { market: 'POWER', region: 'EU', desc: 'Will day-ahead electricity prices (RDN) in any EU member state exceed 300 EUR/MWh?', stake: '845,200', yield: '290%', deadline: '30.07.2026' },
            { market: 'NAT GAS', region: 'TTF', desc: 'Will the TTF Natural Gas Front-Month contract price exceed 50 EUR/MWh?', stake: '2,105,000', yield: '165%', deadline: '31.05.2026' },
            { market: 'CRUDE OIL', region: 'RUSSIA', desc: 'Will a strike on Novorossiysk port disable RU crude oil exports for more than 7 days?', stake: '3,450,000', yield: '820%', deadline: '31.03.2026' }
        ];

        function App() {
            return (
                <div>
                    {/* LOGO / POWRÓT */}
                    <a href="index.html" className="protocol-header">
                        <div className="logo-box">
                            <div className="logo-inner"></div>
                        </div>
                        <span className="protocol-name">BlackSlon Protocol</span>
                    </a>

                    <div className="matrix-layout">
                        {/* PANEL BOCZNY */}
                        <div className="side-panel">
                            <div style={{color: 'var(--bs-blue)', marginBottom: '15px', fontWeight: 'bold', fontSize: '12px'}}>SUBMIT EVENT</div>
                            <label style={{fontSize: '8px', color: '#444'}}>TARGET MARKET</label>
                            <select className="matrix-select"><option>POWER</option><option>NAT GAS</option><option>CRUDE OIL</option></select>
                            <label style={{fontSize: '8px', color: '#444'}}>EVENT DEFINITION</label>
                            <textarea className="matrix-textarea" rows="4" placeholder="Describe the event..."></textarea>
                            <button className="v-btn-submit">STAKE & SUBMIT</button>
                        </div>

                        {/* GŁÓWNY MATRIX */}
                        <div className="matrix-main">
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px'}}>
                                <h1 style={{fontSize: '16px', color: 'var(--bs-blue)', letterSpacing: '2px', margin: 0}}>MATRIX OF EVENTS // LIVE_FEED</h1>
                                <div style={{fontSize: '10px', color: '#333'}}>STATUS: CONNECTED</div>
                            </div>
                            
                            <div className="event-grid">
                                {EVENTS.map((ev, i) => (
                                    <div key={i} className="event-card">
                                        <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '10px'}}>
                                            <span style={{fontSize: '10px', color: '#666'}}>{ev.market} // {ev.region}</span>
                                            <span className="yield-badge">{ev.yield}</span>
                                        </div>
                                        <p style={{fontSize: '12px', color: '#ccc', lineHeight: '1.4', minHeight: '60px'}}>{ev.desc}</p>
                                        <div style={{display: 'flex', gap: '5px', marginBottom: '15px'}}>
                                            <button className="v-btn" style={{borderColor: 'var(--bs-green)', color: 'var(--bs-green)'}}>YES</button>
                                            <button className="v-btn" style={{borderColor: 'var(--bs-red)', color: 'var(--bs-red)'}}>NO</button>
                                        </div>
                                        <div style={{borderTop: '1px solid #111', paddingTop: '10px', fontSize: '10px', color: '#444', display: 'flex', justifyContent: 'space-between'}}>
                                            <span>LIQUIDTY:</span>
                                            <span style={{color: 'var(--bs-blue)', fontWeight: 'bold'}}>{ev.stake} €BLSN</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('blackslon-matrix-root'));
        root.render(<App />);
    </script>
</body>
</html>
