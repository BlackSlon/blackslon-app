<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix of Events - BlackSlon Protocol</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { 
            background-color: #000; margin: 0; padding: 20px; 
            font-family: 'Courier New', monospace; color: #fff; 
            min-height: 100vh;
        }
        :root { --bs-blue: #4682B4; --bs-red: #cc0000; --bs-green: #00ff88; --bs-yellow: #ffcc00; }
        
        #blackslon-matrix-root { padding-bottom: 150px; }

        .matrix-layout { display: flex; gap: 15px; max-width: 1300px; margin: auto; }
        .matrix-main { flex: 1; border: 1px solid #1a1a1a; padding: 15px; background: #020202; }
        .side-panel { width: 260px; border: 1px solid #1a1a1a; padding: 15px; background: #050505; font-size: 11px; height: fit-content; }
        
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-top: 40px; }
        .event-card { background: #000; border: 1px solid #151515; padding: 12px; border-top: 2px solid var(--bs-blue); min-height: 200px; }

        /* NAWIGACJA PRZYPIĘTA DO OKNA (NIE DO STRONY) */
        #protocol-nav {
            position: fixed !important; 
            bottom: 40px !important; /* Odległość od dolnej krawędzi monitora */
            left: 0 !important;
            width: 100% !important;
            display: flex !important; 
            justify-content: center !important;
            gap: 20px !important;
            z-index: 999999 !important;
        }

        .nav-box { width: 45px; height: 45px; border: 2px solid transparent; transition: 0.2s; display: block; }
        .box-home { border-color: #fff; }
        .box-red { background-color: #ff0000; }
        .box-green { background-color: #00ff00; }
        .box-yellow { background-color: #ffcc00; }
        .box-blue { background-color: #0000ff; border: 2px solid var(--bs-blue); }
        .box-wp { background-color: #fff; }

        .matrix-textarea { background: #000; border: 1px solid #1a1a1a; color: #ccc; width: 100%; margin-bottom: 10px; padding: 5px; font-family: monospace; }
        .v-btn-submit { width: 100%; padding: 10px; border: 1px solid var(--bs-yellow); background: transparent; color: var(--bs-yellow); cursor: pointer; }
    </style>
</head>
<body>

    <div id="blackslon-matrix-root"></div>

    <div id="protocol-nav">
        <a href="index.html" class="nav-box box-home"></a>
        <a href="red.html" class="nav-box box-red"></a>
        <a href="green.html" class="nav-box box-green"></a>
        <a href="trading.html" class="nav-box box-yellow"></a>
        <a href="blue.html" class="nav-box box-blue"></a>
        <a href="https://github.com/BlackSlon/BlackSlon-Protocol" target="_blank" class="nav-box box-wp"></a>
    </div>

    <script type="text/babel">
        const EVENTS = [
            { market: 'NAT GAS', desc: 'Will Russia destroy the gas storage in Ukraine?', stake: '1,240,000', yield: '740%' },
            { market: 'POWER', desc: 'Will day-ahead prices exceed 300 EUR/MWh?', stake: '845,200', yield: '290%' },
            { market: 'NAT GAS', desc: 'Will the TTF Natural Gas price exceed 50 EUR/MWh?', stake: '2,105,000', yield: '165%' }
        ];

        function App() {
            return (
                <div className="matrix-layout">
                    <div className="side-panel">
                        <div style={{color: 'var(--bs-blue)', marginBottom: '15px'}}>PUT YOUR EVENT</div>
                        <textarea className="matrix-textarea" rows="4" placeholder="Describe..."></textarea>
                        <button className="v-btn-submit">SUBMIT</button>
                    </div>
                    <div className="matrix-main">
                        <h1 style={{fontSize: '18px', color: 'var(--bs-blue)'}}>MATRIX OF BLACKSLON EVENTS // PROTOCOL</h1>
                        <div className="event-grid">
                            {EVENTS.map((ev, i) => (
                                <div key={i} className="event-card">
                                    <div style={{display:'flex', justifyContent:'space-between'}}>
                                        <span style={{fontSize:'10px'}}>{ev.market}</span>
                                        <span style={{color:'var(--bs-green)'}}>{ev.yield}</span>
                                    </div>
                                    <p style={{fontSize:'12px', margin:'15px 0'}}>{ev.desc}</p>
                                    <div style={{fontSize:'10px', color:'#444'}}>
                                        **Liquidty**: <span style={{color:'var(--bs-blue)'}}>{ev.stake} €BLSN</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('blackslon-matrix-root'));
        root.render(<App />);
    </script>
</body>
</html>
