<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix of Events - BlackSlon Protocol</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* RESET I BAZA */
        html, body { 
            background-color: #000 !important; 
            margin: 0 !important; 
            padding: 0 !important; 
            height: 100% !important;
            overflow-x: hidden;
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        :root { --bs-blue: #4682B4; --bs-red: #cc0000; --bs-green: #00ff88; --bs-yellow: #ffcc00; }

        /* KONTENER DLA REACTA */
        #blackslon-matrix-root { 
            padding: 20px;
            padding-bottom: 150px; /* Miejsce na dock */
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* PROTOCOL DOCK - TOTALNA IZOLACJA */
        .protocol-dock {
            position: fixed !important; 
            bottom: 0 !important; 
            left: 0 !important;
            width: 100% !important;
            height: 100px !important;
            z-index: 2147483647 !important; /* Maksymalny możliwy z-index w przeglądarkach */
            background: linear-gradient(to top, #000 80%, transparent 100%) !important;
            display: flex !important; 
            justify-content: center !important;
            align-items: center !important;
            gap: 20px !important;
            pointer-events: none;
        }

        .nav-box { 
            width: 50px !important; 
            height: 50px !important; 
            border: 2px solid transparent; 
            transition: 0.2s; 
            pointer-events: auto !important;
            display: block;
        }
        .box-home { border-color: #fff; }
        .box-red { background-color: #ff0000; }
        .box-green { background-color: #00ff00; }
        .box-yellow { background-color: #ffcc00; }
        .box-blue { background-color: #0000ff; border: 2px solid var(--bs-blue); }
        .box-wp { background-color: #fff; }
        .nav-box:hover { transform: translateY(-5px); }

        /* STYLE MATRIXA (Uproszczone dla stabilności) */
        .matrix-layout { display: flex; gap: 15px; max-width: 1300px; margin: auto; }
        .matrix-main { flex: 1; border: 1px solid #1a1a1a; padding: 15px; background: #020202; }
        .side-panel { width: 250px; border: 1px solid #1a1a1a; padding: 15px; background: #050505; font-size: 11px; height: fit-content; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 30px; }
        .event-card { background: #000; border: 1px solid #151515; padding: 15px; border-top: 2px solid var(--bs-blue); }
        .v-btn { flex: 1; padding: 8px; font-size: 10px; border: 1px solid #333; background: transparent; color: #fff; cursor: pointer; }
        .matrix-input, .matrix-textarea { background: #000; border: 1px solid #1a1a1a; color: #ccc; width: 100%; margin-bottom: 10px; padding: 5px; }
    </style>
</head>
<body>

    <div id="blackslon-matrix-root"></div>

    <div class="protocol-dock">
        <a href="index.html" class="nav-box box-home" title="Home"></a>
        <a href="red.html" class="nav-box box-red" title="Problem"></a>
        <a href="green.html" class="nav-box box-green" title="Genesis"></a>
        <a href="trading.html" class="nav-box box-yellow" title="Trading Desk"></a>
        <a href="blue.html" class="nav-box box-blue" title="Event Matrix"></a>
        <a href="https://github.com/BlackSlon/BlackSlon-Protocol" target="_blank" class="nav-box box-wp" title="White Paper"></a>
    </div>

    <script type="text/babel">
        const EVENTS = [
            { market: 'NAT GAS', desc: 'Will Russia destroy the gas storage in Ukraine?', stake: '1,240,000', yield: '740%' },
            { market: 'POWER', desc: 'Will day-ahead prices exceed 300 EUR/MWh?', stake: '845,200', yield: '290%' },
            { market: 'NAT GAS', desc: 'Will the TTF Natural Gas price exceed 50 EUR/MWh?', stake: '2,105,000', yield: '165%' }
        ];

        function App() {
            return (
                <div className="matrix-layout">
                    <div className="side-panel">
                        <div style={{color: 'var(--bs-blue)', marginBottom: '15px'}}>PUT YOUR EVENT</div>
                        <textarea className="matrix-textarea" rows="4" placeholder="Describe..."></textarea>
                        <button style={{width:'100%', color:'var(--bs-yellow)', border:'1px solid var(--bs-yellow)', background:'none', padding:'10px', cursor:'pointer'}}>SUBMIT</button>
                    </div>
                    <div className="matrix-main">
                        <h1 style={{fontSize: '18px', color: 'var(--bs-blue)'}}>MATRIX OF BLACKSLON EVENTS // PROTOCOL</h1>
                        <div className="event-grid">
                            {EVENTS.map((ev, i) => (
                                <div key={i} className="event-card">
                                    <div style={{display:'flex', justifyContent:'space-between'}}>
                                        <span style={{fontSize:'10px'}}>{ev.market}</span>
                                        <span style={{color:'var(--bs-green)'}}>{ev.yield}</span>
                                    </div>
                                    <p style={{fontSize:'13px', margin:'15px 0'}}>{ev.desc}</p>
                                    <div style={{fontSize:'10px', color:'#444'}}>
                                        **Liquidty**: <span style={{color:'var(--bs-blue)'}}>{ev.stake} €BLSN</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('blackslon-matrix-root'));
        root.render(<App />);
    </script>
</body>
</html>
