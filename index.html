<!DOCTYPE html>

<head>

    <title>BlackSlon Protocol</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;

        }
        
        /* Kolory przycisków */
        .red { background-color: #FF0000; color: white; }
        .green { background-color: #00FF00; color: black; }
