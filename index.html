<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackSlon Protocol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .main-container {
            text-align: center;
            margin-top: -30px;
        }

        .brand {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .brand-sub {
            font-size: 14px;
            color: #444;
            letter-spacing: 5px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Twoje Logo Base64 */
        .bs-logo {
            width: 380px; 
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Dolna Nawigacja Kwadratowa */
        .nav-footer {
            position: absolute;
            bottom: 60px;
            display: flex;
            gap: 20px;
        }

        .nav-box {
            width: 55px;
            height: 55px;
            border: 2px solid transparent;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .box-home   { border-color: #fff; } 
        .box-red    { background-color: #ff0000; }
        .box-green  { background-color: #00ff00; }
        .box-yellow { background-color: #ffcc00; }
        .box-blue   { background-color: #0000ff; }
        .box-wp     { background-color: #fff; }

        .nav-box:hover { transform: scale(1.1); }

        .status-bar {
            position: absolute;
            bottom: 20px;
            font-size: 9px;
            color: #222;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
