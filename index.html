        .nav-grid {
            display: grid;

        .blue { color: #0000ff; }

            grid-column: span 2; 
            color: #ffffff; 
            border-color: #333;
            margin-top: 10px;
            padding: 25px;
            font-size: 15px;
        }
        .white-paper:hover { border-color: #fff; background: rgba(255, 255, 255, 0.1); }

        .status-bar {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 2px;

</head>

    <div class="logo">BlackSlon</div>
