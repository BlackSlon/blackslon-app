<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackSlon Protocol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .main-container {
            text-align: center;
            margin-top: -20px;
        }

        .brand {
            font-size: 38px;
            font-weight: 400;
            margin-bottom: 2px;
            letter-spacing: 2px;
        }

        .brand-sub {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Kontener na BS_image - Czarny Kwadrat Malewicza */
        .logo-box {
            width: 380px;
            height: 380px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .bs-logo {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        /* Dolna Nawigacja - Twoje kwadraty 1:1 */
        .nav-footer {
            position: absolute;
            bottom: 60px;
            display: flex;
            gap: 20px;
        }

        .nav-box {
            width: 55px;
            height: 55px;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        /* Mapowanie kolorów ze zrzutu 223 */
        .box-home   { border-color: #fff; } 
        .box-red    { background-color: #ff0000; }
        .box-green  { background-color: #00ff00; }
        .box-yellow { background-color: #ffcc00; }
        .box-blue   { background-color: #0000ff; }
        .box-wp     { background-color: #fff; }

        .nav-box:hover { transform: scale(1.1); filter: brightness(1.2); }

        .status-bar {
            position: absolute;
            bottom: 20px;
            font-size: 9px;
            color: #222;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="brand">BlackSlon</div>
        <div class="brand-sub">Energy Indexes™</div>
        
        <div class="logo-box">
            <img src="BS_image.JPG" alt="BlackSlon Protocol" class="bs-logo">
        </div>
    </div>

    <div class="nav-footer">
        <a href="index.html" class="nav-box box-home" title="Home"></a>
        <a href="red.html" class="nav-box box-red" title="The Problem"></a>
        <a href="green.html" class="nav-box box-green" title="The Genesis"></a>
        <a href="trading.html" class="nav-box box-yellow" title="Trading Desk"></a>
        <a href="blue.html" class="nav-box box-blue" title="Event Matrix"></a>
        <a href="https://github.com/BlackSlon/BlackSlon-Protocol/blob/main/docs/white-paper.md" target="_blank" class="nav-box box-wp" title="White Paper"></a>
    </div>

    <div class="status-bar">
        BLACKSLON **PROTOCOL** // AUTOMATED **LIQUIDTY** LAYER // V.2026.02
    </div>

</body>
</html>
